# ── Terminal / OSC 8 hyperlinks ──────────────────────────────────────────────
# xterm-256color extends tmux-256color with Hls/hle so programs inside
# panes auto-detect OSC 8 support via terminfo.
set -g default-terminal "xterm-256color"
# Tell tmux the outer terminal (Terminator/VTE, xterm-compat) supports OSC 8,
# so tmux re-emits stored hyperlinks when rendering the pane to the screen.
set -ga terminal-features '*:hyperlinks'

# ── Status bar appearance ────────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-style 'bg=green fg=black bold'
set -g status-left-length 200
set -g status-right-length 8
set -g status-right '#{@tab_age}'
set -g status-interval 2

# ── Focus events ─────────────────────────────────────────────────────────────
# Forward focus-in/out from the outer terminal into panes.
set -g focus-events on
# Record the pane that most recently gained focus so terminal-shell can read
# its live CWD when opening a new tab (#{pane_current_path} from /proc/PID/cwd).
set-hook -g pane-focus-in 'set -g @last_focused_pane "#{pane_id}"'

# ── Status bar content ───────────────────────────────────────────────────────
# Auto status is written via rename-window so #{window_name} is per-window.
# Disable tmux's own automatic rename so our renames are not clobbered.
set -g automatic-rename off
set -g allow-rename off

set -g status-left '#{window_name}'

# ── Mouse / scrolling / clipboard ────────────────────────────────────────────
set -g mouse on

# Enter copy-mode on scroll-up so the buffer is browsable; pass events through
# when already in copy-mode or when the pane runs a full-screen app (alternate
# screen, e.g. vim/less) so they keep handling their own scrolling.
bind -n WheelUpPane \
    if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
        "send-keys -M" \
        "copy-mode -e"

# Pass Page Up/Down directly to full-screen apps (alternate screen: less, vim,
# etc.).  When no alternate screen is active, use them to enter/scroll copy-mode.
bind -n PPage if-shell -F "#{alternate_on}" "send-keys PPage" "copy-mode -u"
bind -n NPage if-shell -F "#{alternate_on}" "send-keys NPage" ""

# On mouse drag-end, copy the selection to the X11 clipboard so normal
# Ctrl-V / middle-click paste keeps working outside tmux.
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# ── Minimal chrome ───────────────────────────────────────────────────────────
set -g pane-border-status off
set -g window-status-format ''
set -g window-status-current-format ''
